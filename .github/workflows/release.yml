name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test shrun.Tests/shrun.Tests.csproj

      - name: Publish
        run: dotnet publish shrun.csproj -c Release -o publish

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/shrun.exe
          generate_release_notes: true
